name: Build weekly arch trends

on:
  schedule:
    # 월요일 00:00 UTC = 월요일 09:00 KST
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: node scripts/build.mjs
        env:
          MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}
          # PAT for reading the private design-competition-ontology repo's
          # data/sample-packs/*.json (fine-grained token, Contents:Read scope).
          # Worker still runs without this — pack dictionary just becomes empty.
          READ_PACKS_TOKEN: ${{ secrets.READ_PACKS_TOKEN }}
          # lite 프로파일이 structured_output_schema 미지원 (400 invalid_argument)
          # → 표준 'manus-1.6'으로 격상. 품질 더 필요하면 'manus-1.6-max'.
          MANUS_AGENT_PROFILE: manus-1.6

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "weekly: $(date -u +%Y-%m-%d)"
          git push
